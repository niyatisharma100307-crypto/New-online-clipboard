<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Online Clipboard user flow diagram">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg2)"/>
  <text x="60" y="58" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">User Flow</text>
  <text x="60" y="88" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="15">What a contributor or user does in the app</text>

  <g filter="url(#shadow2)">
    <circle cx="120" cy="180" r="54" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="120" y="176" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Open App</text>
    <text x="120" y="198" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12">Home page</text>

    <rect x="240" y="128" width="170" height="104" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
    <text x="325" y="159" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Create Clip</text>
    <text x="325" y="183" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Paste text or upload file</text>
    <text x="325" y="203" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Choose public or private</text>

    <rect x="480" y="128" width="170" height="104" rx="18" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <text x="565" y="159" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Get Code</text>
    <text x="565" y="183" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">System generates share code</text>
    <text x="565" y="203" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Copy it for later use</text>

    <rect x="720" y="128" width="170" height="104" rx="18" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="805" y="159" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Share / Save</text>
    <text x="805" y="183" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Send code to another device</text>
    <text x="805" y="203" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Or keep it in history</text>

    <circle cx="1020" cy="180" r="54" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="1020" y="176" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Retrieve</text>
    <text x="1020" y="198" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12">Search by code</text>
  </g>

  <path d="M174 180 L232 180" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round"/>
  <path d="M410 180 L472 180" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round"/>
  <path d="M650 180 L712 180" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round"/>
  <path d="M890 180 L962 180" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="232,180 218,172 218,188" fill="#38bdf8"/>
  <polygon points="472,180 458,172 458,188" fill="#38bdf8"/>
  <polygon points="712,180 698,172 698,188" fill="#38bdf8"/>
  <polygon points="962,180 948,172 948,188" fill="#38bdf8"/>

  <rect x="250" y="254" width="700" height="54" rx="14" fill="#0b1020" stroke="#1f2937"/>
  <text x="600" y="287" fill="#cbd5e1" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Beginner-friendly contributor path: pick a good first issue, make a focused change, open a small PR</text>
</svg>