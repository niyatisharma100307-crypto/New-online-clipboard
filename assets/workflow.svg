<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Online Clipboard workflow diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text x="60" y="58" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Workflow</text>
  <text x="60" y="88" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="15">How content moves through the system</text>

  <g filter="url(#shadow)">
    <rect x="70" y="128" width="170" height="82" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="155" y="160" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Paste / Upload</text>
    <text x="155" y="184" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Text or file clip</text>

    <rect x="290" y="128" width="170" height="82" rx="18" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
    <text x="375" y="160" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Validate</text>
    <text x="375" y="184" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Size, visibility, user</text>

    <rect x="510" y="128" width="170" height="82" rx="18" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <text x="595" y="160" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Encrypt</text>
    <text x="595" y="184" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Protect clipboard data</text>

    <rect x="730" y="128" width="170" height="82" rx="18" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="815" y="160" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Store</text>
    <text x="815" y="184" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">PostgreSQL + Redis</text>

    <rect x="950" y="128" width="170" height="82" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="1035" y="160" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Share Code</text>
    <text x="1035" y="184" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Access from any device</text>
  </g>

  <path d="M240 169 L282 169" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M460 169 L502 169" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M680 169 L722 169" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M900 169 L942 169" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="282,169 268,161 268,177" fill="#22c55e"/>
  <polygon points="502,169 488,161 488,177" fill="#22c55e"/>
  <polygon points="722,169 708,161 708,177" fill="#22c55e"/>
  <polygon points="942,169 928,161 928,177" fill="#22c55e"/>

  <rect x="290" y="240" width="620" height="64" rx="16" fill="#0b1020" stroke="#1f2937"/>
  <text x="600" y="266" fill="#cbd5e1" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Offline sync keeps unsent clips queued until the network returns</text>
  <text x="600" y="288" fill="#94a3b8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13">Useful for unstable connections and cross-device clipboard access</text>
</svg>