spring.application.name=online-clipboard-backend

# --- Database Connection ---
# Use ${VARIABLE_NAME} to pull from environment
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- Driver Configuration ---
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Hibernate / JPA Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Increase Upload Limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ensure server doesn't time out on slow uploads
server.tomcat.connection-timeout=20000

# --- Upstash Redis Connection ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# --- Cloudinary Configuration ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# --- Application Secret Key ---
app.secret-key=${APP_SECRET_KEY}

# --- Clerk Configuration ---
clerk.issuer=${CLERK_ISSUER}

# --- HTTP Response Compression ---
# 1. Turn the compression engine on
server.compression.enabled=true

# 2. Tell it WHICH types of files to compress (Crucial: include application/json)
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# 3. Only compress things larger than 1KB (Compressing tiny things actually wastes CPU)
server.compression.min-response-size=1024